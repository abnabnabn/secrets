name: Cleanup GHCR

on:
  schedule:
    # Run every Sunday at 03:00 AM (1 hour after the docker-publish cron)
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune untagged GHCR images
        uses: vlaurin/action-ghcr-prune@v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          container: tiny-secrets-manager
          dry-run: false
          prune-untagged: true
          keep-younger-than: 0 # Immediately delete any image that has lost its tag
