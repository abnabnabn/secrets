services:
  tsm-server:
    image: ghcr.io/abnabnabn/tiny-secrets-manager:latest
    ports:
      - "8090:8090"
    environment:
      # Core Configuration
      - TSM_LISTEN=0.0.0.0:8090
      - TSM_DB_PATH=/data/tsm.db
      - TSM_BACKUP_TARGET=/backups/
      - TSM_INSECURE=true # for development mode
      # Bootstrapping Credentials
      - TSM_MASTER_KEY=${TSM_MASTER_KEY} # Leave empty to auto-generate or provide one
      - TSM_ADMIN_USER=${TSM_ADMIN_USER:-admin}
      - TSM_ADMIN_PASS=${TSM_ADMIN_PASS:-admin-password}
      - TSM_ADMIN_TOKEN=${TSM_ADMIN_TOKEN} # Leave empty to auto-generate or provide one
    volumes:
      - ./data.tsm:/data
      - ./backups.tsm:/backups
    restart: unless-stopped
